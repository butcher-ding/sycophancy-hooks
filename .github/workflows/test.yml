name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['16', '18', '20', '22']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Syntax check
        run: npm run lint:syntax

      - name: Unit tests
        run: npm test

      - name: Smoke test (append-with-lock on ${{ matrix.os }})
        run: node tests/smoke-append.js
